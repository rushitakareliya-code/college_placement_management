<div class="flex h-screen bg-gray-50">

  <!-- Sidebar -->
  <aside
  class="bg-gray-900 text-gray-200 transition-all duration-300 flex flex-col"
  [class.w-64]="sidebarOpen"
  [class.w-20]="!sidebarOpen">

    <!-- Logo -->
    <div class="h-16 flex items-center justify-center border-b border-gray-700 text-lg font-semibold">
      <span *ngIf="sidebarOpen">Placement</span>
      <span *ngIf="!sidebarOpen">P</span>
    </div>

    <!-- Menu -->
    <nav class="flex-1 p-3 space-y-2">

      <a routerLink="/admin/dashboard" class="menu-item">
        📊 <span  *ngIf="sidebarOpen">Dashboard</span>
      </a>

      <a routerLink="/admin/students" class="menu-item">
        👨‍🎓 <span *ngIf="sidebarOpen">Students</span>
      </a>

      <a routerLink="/admin/companies" class="menu-item">
        🏢 <span *ngIf="sidebarOpen">Companies</span>
      </a>

      <a routerLink="/admin/jobs" class="menu-item">
        💼 <span *ngIf="sidebarOpen">Jobs</span>
      </a>

      <a routerLink="/admin/applications" class="menu-item">
        📄 <span *ngIf="sidebarOpen">Applications</span>
      </a>

      <a routerLink="/admin/notices" class="menu-item">
        📢 <span *ngIf="sidebarOpen">Notices</span>
      </a>

    </nav>

  </aside>


  <!-- Main -->
  <div class="flex-1 flex flex-col">

    <!-- Navbar -->
    <header class="h-16 bg-white border-b flex items-center justify-between px-6">

      <div class="flex items-center gap-4">

        <!-- Toggle -->
        <button
        (click)="toggleSidebar()"
        class="text-gray-600 hover:text-black text-xl transition">
        ☰
        </button>

        <h1 class="text-lg font-semibold text-gray-700">
          Student Placement System
        </h1>

      </div>

      <button class="bg-teal-500 text-white px-4 py-2 rounded-lg hover:bg-teal-600 transition">
        Logout
      </button>

    </header>


    <!-- Page -->
    <main class="flex-1 p-6 overflow-y-auto">

      <router-outlet></router-outlet>

    </main>

  </div>

</div>
