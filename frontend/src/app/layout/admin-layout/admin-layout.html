<div class="flex h-screen bg-slate-50 font-sans">

  <aside
    class="bg-[#0f172a] text-slate-300 transition-all duration-300 flex flex-col shadow-2xl z-20"
    [class.w-72]="sidebarOpen"
    [class.w-20]="!sidebarOpen">

    <div class="h-20 flex items-center px-6 mb-4 border-b border-slate-800/50">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-teal-500 flex items-center justify-center shrink-0 shadow-lg shadow-teal-500/20">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path d="M12 14l9-5-9-5-9 5 9 5z" /><path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" />
          </svg>
        </div>
        <span *ngIf="sidebarOpen" class="text-xl font-bold tracking-tight text-white transition-all duration-300 overflow-hidden whitespace-nowrap">
          Portal<span class="text-teal-400">Hub</span>
        </span>
      </div>
    </div>

    <nav class="flex-1 px-4 py-4 space-y-1.5 overflow-y-auto custom-scrollbar">
      
      <a routerLink="/admin/dashboard" routerLinkActive="bg-teal-500/10 text-teal-400 border-teal-500/50" 
         class="group flex items-center gap-4 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-white/5 hover:text-white border border-transparent">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z" /></svg>
        <span *ngIf="sidebarOpen" class="font-medium">Dashboard</span>
      </a>

      <a routerLink="/admin/students" routerLinkActive="bg-teal-500/10 text-teal-400 border-teal-500/50"
         class="group flex items-center gap-4 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-white/5 hover:text-white border border-transparent">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
        <span *ngIf="sidebarOpen" class="font-medium">Students</span>
      </a>

      <a routerLink="/admin/companies" routerLinkActive="bg-teal-500/10 text-teal-400 border-teal-500/50"
         class="group flex items-center gap-4 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-white/5 hover:text-white border border-transparent">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-10V4m0 10V4m-4 10h4" /></svg>
        <span *ngIf="sidebarOpen" class="font-medium">Companies</span>
      </a>

      <a routerLink="/admin/jobs" routerLinkActive="bg-teal-500/10 text-teal-400 border-teal-500/50"
         class="group flex items-center gap-4 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-white/5 hover:text-white border border-transparent">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
        <span *ngIf="sidebarOpen" class="font-medium">Jobs</span>
      </a>

      <a routerLink="/admin/applications" routerLinkActive="bg-teal-500/10 text-teal-400 border-teal-500/50"
         class="group flex items-center gap-4 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-white/5 hover:text-white border border-transparent">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
        <span *ngIf="sidebarOpen" class="font-medium">Applications</span>
      </a>

      <a routerLink="/admin/notices" routerLinkActive="bg-teal-500/10 text-teal-400 border-teal-500/50"
         class="group flex items-center gap-4 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-white/5 hover:text-white border border-transparent">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z" /><path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" /></svg>
        <span *ngIf="sidebarOpen" class="font-medium">Notices</span>
      </a>

      <a routerLink="/admin/contacts" routerLinkActive="bg-teal-500/10 text-teal-400 border-teal-500/50"
         class="group flex items-center gap-4 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-white/5 hover:text-white border border-transparent">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" /></svg>
        <span *ngIf="sidebarOpen" class="font-medium">Contact Requests</span>
      </a>

      <a routerLink="/admin/email-settings" routerLinkActive="bg-teal-500/10 text-teal-400 border-teal-500/50"
         class="group flex items-center gap-4 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-white/5 hover:text-white border border-transparent">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
        <span *ngIf="sidebarOpen" class="font-medium">Email Settings</span>
      </a>

    </nav>

    <div class="p-4 border-t border-slate-800/50 mt-auto">
      <div class="flex items-center gap-3 p-2 rounded-xl bg-slate-800/30">
        <div class="w-8 h-8 rounded-lg bg-teal-500 flex items-center justify-center font-bold text-xs text-white uppercase shrink-0">{{ adminInitials }}</div>
        <div *ngIf="sidebarOpen" class="overflow-hidden min-w-0">
          <p class="text-xs font-bold text-white truncate">{{ adminName }}</p>
          <p class="text-[10px] truncate text-teal-400" [title]="adminEmail || '—'">{{ adminEmail || '—' }}</p>
        </div>
      </div>
    </div>

  </aside>


  <div class="flex-1 flex flex-col min-w-0">

    <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-8 z-10 sticky top-0">

      <div class="flex items-center gap-6">
        <button (click)="toggleSidebar()"
          class="p-2.5 rounded-xl hover:bg-slate-100 text-slate-500 hover:text-teal-600 transition-all duration-200 border border-slate-100 shadow-sm active:scale-90">
          <svg *ngIf="sidebarOpen" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7" /></svg>
          <svg *ngIf="!sidebarOpen" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7" /></svg>
        </button>

        <nav class="hidden sm:flex items-center text-sm font-medium flex-wrap gap-y-1" aria-label="Breadcrumb">
          <ng-container *ngFor="let crumb of breadcrumbs; let last = last">
            <a *ngIf="crumb.url"
               [routerLink]="crumb.url"
               class="text-slate-500 hover:text-teal-600 transition-colors">
              {{ crumb.label }}
            </a>
            <span *ngIf="!crumb.url" class="text-slate-800 font-semibold">{{ crumb.label }}</span>
            <svg *ngIf="!last" class="h-4 w-4 mx-2 text-slate-300 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
          </ng-container>
        </nav>
      </div>

      <div class="flex items-center gap-4">
        <button routerLink="/admin/notices" class="p-2 text-slate-400 hover:text-teal-600 rounded-lg hover:bg-teal-50 transition-colors" title="View Notices">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>
        </button>

        <button type="button" (click)="logout()"
          class="flex items-center gap-2 bg-slate-900 text-white px-5 py-2.5 rounded-xl hover:bg-teal-600 transition-all shadow-lg shadow-slate-200 active:scale-95 font-semibold text-sm">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
          Logout
        </button>
      </div>

    </header>


    <main class="flex-1 p-8 overflow-y-auto bg-[#f8fafc]">
      <div class="max-w-7xl mx-auto">
        <router-outlet></router-outlet>
      </div>
    </main>

  </div>

</div>
