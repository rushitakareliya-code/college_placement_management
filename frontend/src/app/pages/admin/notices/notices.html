<div class="flex justify-between mb-4">

    <h2 class="text-2xl font-bold">Notices</h2>

    <button (click)="openModal()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
        Add Notice
    </button>

</div>

<div class="bg-white rounded shadow">

    <table class="w-full">

        <thead class="bg-gray-200">
            <tr>
                <th class="p-3 text-left">Title</th>
                <th class="p-3 text-left">Description</th>
                <th class="p-3 text-left">Date</th>
                <th class="p-3 text-left">Action</th>
            </tr>
        </thead>

        <tbody>

            <tr *ngFor="let notice of notices; let i = index" class="border-t hover:bg-gray-50">

                <td class="p-3">{{notice.title}}</td>
                <td class="p-3">{{notice.description}}</td>
                <td class="p-3">{{notice.date}}</td>

                <td class="p-3 flex gap-3">

                    <!-- Edit -->
                    <button (click)="editNotice(i)" class="text-blue-600 hover:text-blue-800">

                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">

                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M11 5h2m-1-1v2m-6 8l9-9 3 3-9 9H5v-3z" />

                        </svg>

                    </button>

                    <!-- Delete -->
                    <button (click)="deleteNotice(i)" class="text-red-600 hover:text-red-800">

                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">

                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2
2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M9
7h6m2 0H7" />

                        </svg>

                    </button>

                </td>

            </tr>

        </tbody>

    </table>

</div>


<!-- Modal -->

<div *ngIf="isModalOpen" (click)="closeModal()"
    class="fixed inset-0 bg-black/10 backdrop-blur-sm flex items-center justify-center">

    <div (click)="$event.stopPropagation()" class="bg-white w-96 p-6 rounded shadow-lg">

        <h2 class="text-xl font-bold mb-4">
            {{editIndex !== null ? 'Edit Notice' : 'Add Notice'}}
        </h2>

        <form (ngSubmit)="saveNotice()">

            <div class="mb-4">

                <label class="block mb-1">Title</label>

                <input type="text" [(ngModel)]="notice.title" name="title" class="w-full border rounded px-3 py-2"
                    placeholder="Enter notice title" required>

            </div>

            <div class="mb-4">

                <label class="block mb-1">Description</label>

                <textarea [(ngModel)]="notice.description" name="description" rows="3"
                    class="w-full border rounded px-3 py-2" placeholder="Enter notice description" required>
</textarea>

            </div>

            <div class="flex justify-end gap-3">

                <button type="button" (click)="closeModal()"
                    class="bg-gray-400 text-white px-4 py-2 rounded hover:bg-gray-500">
                    Cancel
                </button>

                <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
                    Save
                </button>

            </div>

        </form>

    </div>

</div>
