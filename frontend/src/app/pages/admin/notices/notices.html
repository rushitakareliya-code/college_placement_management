<div class="flex justify-between items-center mb-6">

    <h2 class="text-2xl font-semibold text-gray-700">
        Notices
    </h2>

    <button (click)="openModal()"
        class="bg-teal-500 text-white px-4 py-2 rounded-lg hover:bg-teal-600 transition shadow">
        + Add Notice
    </button>

</div>


<div class="bg-white shadow rounded-xl border overflow-x-auto">

    <table class="w-full text-sm">

        <thead class="bg-gray-100 text-gray-600">

            <tr>
                <th class="p-4 text-left">Title</th>
                <th class="p-4 text-left">Message</th>
                <th class="p-4 text-left">Attachments</th>
                <th class="p-4 text-left">Date</th>
                <th class="p-4 text-left">Action</th>
            </tr>

        </thead>


        <tbody>

            <tr *ngFor="let notice of notices; let i = index" class="border-t hover:bg-gray-50 transition">

                <td class="p-4 font-medium">
                    {{notice.title}}
                </td>

                <td class="p-4">
                    {{notice.message}}
                </td>

                <td class="p-4">
                    <ng-container *ngIf="notice.attachments?.length; else noAttachment">
                        <div class="flex flex-col gap-1">
                            <a *ngFor="let file of notice.attachments" [href]="'http://localhost:5000' + file" target="_blank"
                                class="text-teal-600 hover:underline">
                                {{file}}
                            </a>
                        </div>
                    </ng-container>
                    <ng-template #noAttachment>-</ng-template>
                </td>

                <td class="p-4">
                    {{notice.createdAt | date:'short'}}
                </td>

                <td class="p-4 flex gap-3">

                    <button (click)="editNotice(i)" class="text-teal-600 hover:text-teal-800 font-medium">
                        Edit
                    </button>

                    <button (click)="deleteNotice(i)" class="text-red-500 hover:text-red-700 font-medium">
                        Delete
                    </button>

                </td>

            </tr>

        </tbody>

    </table>

</div>



<!-- Modal -->

<div *ngIf="isModalOpen" (click)="closeModal()"
    class="fixed inset-0 bg-black/20 backdrop-blur-sm flex items-center justify-center">

    <div (click)="$event.stopPropagation()" class="bg-white w-[450px] p-6 rounded-xl shadow-lg">

        <h2 class="text-xl font-semibold text-gray-700 mb-5">

            {{editIndex !== null ? 'Edit Notice' : 'Add Notice'}}

        </h2>


        <form (ngSubmit)="saveNotice()" class="space-y-4">


            <div>

                <label class="block text-sm mb-1 text-gray-600">
                    Title
                </label>

                <input type="text" [(ngModel)]="notice.title" name="title"
                    class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-teal-400 outline-none" required>

            </div>


            <div>

                <label class="block text-sm mb-1 text-gray-600">
                    Message
                </label>

                <textarea [(ngModel)]="notice.message" name="message" rows="3"
                    class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-teal-400 outline-none" required>
                </textarea>

            </div>

            <div>
                <label class="block text-sm mb-1 text-gray-600">
                    Attachments
                </label>
                <input type="file" name="attachments" multiple (change)="onFilesSelected($event)"
                    accept=".pdf,.doc,.docx,.txt,.png,.jpg,.jpeg,.webp"
                    class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-teal-400 outline-none">
                <div *ngIf="selectedFiles.length" class="text-xs text-gray-600 mt-2">
                    {{selectedFiles.length}} file(s) selected
                </div>
                <div *ngIf="editIndex !== null && notice.attachments?.length" class="mt-2">
                    <p class="text-xs text-gray-600 mb-1">Existing attachments:</p>
                    <div class="flex flex-col gap-1">
                        <a *ngFor="let file of notice.attachments" [href]="'http://localhost:5000' + file" target="_blank"
                            class="text-teal-600 hover:underline text-xs">
                            {{file}}
                        </a>
                    </div>
                </div>
            </div>

            <div class="flex justify-end gap-3 pt-4">

                <button type="button" (click)="closeModal()" class="px-4 py-2 bg-gray-300 rounded-lg hover:bg-gray-400">
                    Cancel
                </button>

                <button type="submit" class="px-4 py-2 bg-teal-500 text-white rounded-lg hover:bg-teal-600">
                    Save Notice
                </button>

            </div>

        </form>

    </div>

</div>
