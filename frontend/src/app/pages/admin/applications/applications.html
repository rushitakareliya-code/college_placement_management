<div class="flex justify-between items-center mb-6">

    <h2 class="text-2xl font-semibold text-gray-700">
        Applications
    </h2>

</div>


<div class="bg-white shadow rounded-xl border overflow-x-auto">

    <table class="w-full text-sm">

        <thead class="bg-gray-100 text-gray-600">

            <tr>
                <th class="p-4 text-left">Student</th>
                <th class="p-4 text-left">Job</th>
                <th class="p-4 text-left">Company</th>
                <th class="p-4 text-left">Status</th>
                <th class="p-4 text-left">Action</th>
            </tr>

        </thead>


        <tbody>

            <tr *ngFor="let app of applications; let i = index" class="border-t hover:bg-gray-50 transition">

                <td class="p-4 font-medium">
                    {{app.student}}
                </td>

                <td class="p-4">
                    {{app.job}}
                </td>

                <td class="p-4">
                    {{app.company}}
                </td>


                <td class="p-4">

                    <span class="px-3 py-1 rounded text-xs font-medium" [ngClass]="{
'bg-yellow-100 text-yellow-700': app.status === 'Pending',
'bg-green-100 text-green-700': app.status === 'Approved',
'bg-red-100 text-red-700': app.status === 'Rejected'
}">
                        {{app.status}}
                    </span>

                </td>


                <td class="p-4">

                    <button (click)="viewApplication(app)"
                        class="bg-teal-500 text-white px-3 py-1 rounded-lg hover:bg-teal-600 transition">

                        View

                    </button>

                </td>

            </tr>

        </tbody>

    </table>

</div>



<!-- Modal -->

<div *ngIf="isModalOpen" (click)="closeModal()"
    class="fixed inset-0 bg-black/20 backdrop-blur-sm flex items-center justify-center">

    <div (click)="$event.stopPropagation()" class="bg-white w-[420px] p-6 rounded-xl shadow-lg">

        <h2 class="text-xl font-semibold text-gray-700 mb-5">

            Application Details

        </h2>


        <div class="space-y-2 text-sm">

            <p><b>Student:</b> {{selectedApplication?.student}}</p>

            <p><b>Job:</b> {{selectedApplication?.job}}</p>

            <p><b>Company:</b> {{selectedApplication?.company}}</p>

            <p><b>Status:</b> {{selectedApplication?.status}}</p>

        </div>


        <div class="flex justify-between mt-6">

            <button (click)="updateStatus('Approved')"
                class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600">

                Approve

            </button>


            <button (click)="updateStatus('Rejected')"
                class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600">

                Reject

            </button>


            <button (click)="closeModal()" class="bg-gray-400 text-white px-4 py-2 rounded-lg hover:bg-gray-500">

                Close

            </button>

        </div>

    </div>

</div>
