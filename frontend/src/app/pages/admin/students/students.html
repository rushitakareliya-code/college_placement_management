<div class="flex justify-between mb-4">

    <h2 class="text-2xl font-bold">Students</h2>

    <button (click)="openModal()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
        Add Student
    </button>

</div>

<div class="bg-white shadow rounded">

    <table class="w-full">

        <thead class="bg-gray-200">

            <tr>
                <th class="p-3 text-left">Name</th>
                <th class="p-3 text-left">Email</th>
                <th class="p-3 text-left">Course</th>
                <th class="p-3 text-left">Action</th>
            </tr>

        </thead>

        <tbody>

            <tr *ngFor="let student of students; let i=index" class="border-t hover:bg-gray-50">

                <td class="p-3">{{student.name}}</td>
                <td class="p-3">{{student.email}}</td>
                <td class="p-3">{{student.course}}</td>

                <td class="p-3 flex gap-3">

                    <button (click)="editStudent(i)" class="text-blue-600 hover:text-blue-800">
                        Edit
                    </button>

                    <button (click)="deleteStudent(i)" class="text-red-600 hover:text-red-800">
                        Delete
                    </button>

                </td>

            </tr>

        </tbody>

    </table>

</div>


<!-- Modal -->

<div *ngIf="isModalOpen" (click)="closeModal()"
    class="fixed inset-0 bg-black/10 backdrop-blur-sm flex items-center justify-center">

    <div (click)="$event.stopPropagation()" class="bg-white w-96 p-6 rounded shadow-lg">

        <h2 class="text-xl font-bold mb-4">
            {{editIndex !== null ? 'Edit Student' : 'Add Student'}}
        </h2>

        <form (ngSubmit)="saveStudent()">

            <div class="mb-4">

                <label class="block mb-1">Name</label>

                <input type="text" [(ngModel)]="student.name" name="name" class="w-full border rounded px-3 py-2"
                    required>

            </div>

            <div class="mb-4">

                <label class="block mb-1">Email</label>

                <input type="email" [(ngModel)]="student.email" name="email" class="w-full border rounded px-3 py-2"
                    required>

            </div>

            <div class="mb-4">

                <label class="block mb-1">Course</label>

                <input type="text" [(ngModel)]="student.course" name="course" class="w-full border rounded px-3 py-2"
                    required>

            </div>

            <div class="flex justify-end gap-3">

                <button type="button" (click)="closeModal()" class="bg-gray-400 text-white px-4 py-2 rounded">
                    Cancel
                </button>

                <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded">
                    Save
                </button>

            </div>

        </form>

    </div>

</div>
