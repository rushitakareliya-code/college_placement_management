<div class="flex justify-between mb-4">

<h2 class="text-2xl font-bold">Jobs</h2>

<button
(click)="openModal()"
class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
Add Job
</button>

</div>

<div class="bg-white rounded shadow">

<table class="w-full">

<thead class="bg-gray-200">

<tr>
<th class="p-3 text-left">Title</th>
<th class="p-3 text-left">Company</th>
<th class="p-3 text-left">Package</th>
<th class="p-3 text-left">Deadline</th>
<th class="p-3 text-left">Action</th>
</tr>

</thead>

<tbody>

<tr *ngFor="let job of jobs; let i=index" class="border-t hover:bg-gray-50">

<td class="p-3">{{job.title}}</td>
<td class="p-3">{{job.company}}</td>
<td class="p-3">{{job.package}}</td>
<td class="p-3">{{job.deadline}}</td>

<td class="p-3 flex gap-3">

<button (click)="editJob(i)" class="text-blue-600 hover:text-blue-800">
Edit
</button>

<button (click)="deleteJob(i)" class="text-red-600 hover:text-red-800">
Delete
</button>

</td>

</tr>

</tbody>

</table>

</div>

<!-- Modal -->

<div *ngIf="isModalOpen"
(click)="closeModal()"
class="fixed inset-0 bg-black/10 backdrop-blur-sm flex items-center justify-center">

<div
(click)="$event.stopPropagation()"
class="bg-white w-96 p-6 rounded shadow-lg">

<h2 class="text-xl font-bold mb-4">
{{editIndex !== null ? 'Edit Job' : 'Add Job'}}
</h2>

<form (ngSubmit)="saveJob()">

<div class="mb-4">
<label class="block mb-1">Title</label>

<input
type="text"
[(ngModel)]="job.title"
name="title"
class="w-full border rounded px-3 py-2"
required>
</div>

<div class="mb-4">
<label class="block mb-1">Company</label>

<input
type="text"
[(ngModel)]="job.company"
name="company"
class="w-full border rounded px-3 py-2"
required>
</div>

<div class="mb-4">
<label class="block mb-1">Package</label>

<input
type="text"
[(ngModel)]="job.package"
name="package"
class="w-full border rounded px-3 py-2"
required>
</div>

<div class="mb-4">
<label class="block mb-1">Deadline</label>

<input
type="date"
[(ngModel)]="job.deadline"
name="deadline"
class="w-full border rounded px-3 py-2"
required>
</div>

<div class="flex justify-end gap-3">

<button
type="button"
(click)="closeModal()"
class="bg-gray-400 text-white px-4 py-2 rounded">
Cancel
</button>

<button
type="submit"
class="bg-green-600 text-white px-4 py-2 rounded">
Save
</button>

</div>

</form>

</div>

</div>
