<div class="flex justify-between items-center mb-6">

    <h2 class="text-2xl font-semibold text-gray-700">
        Jobs
    </h2>

    <button (click)="openModal()"
        class="bg-teal-500 text-white px-4 py-2 rounded-lg hover:bg-teal-600 transition shadow">
        + Add Job
    </button>

</div>


<div class="bg-white rounded-xl shadow border overflow-hidden">

    <table class="w-full text-sm">

        <thead class="bg-gray-100 text-gray-600">

            <tr>
                <th class="p-4 text-left">Job Title</th>
                <th class="p-4 text-left">Company</th>
                <th class="p-4 text-left">Salary</th>
                <th class="p-4 text-left">Deadline</th>
                <th class="p-4 text-left">Applicants</th>
                <th class="p-4 text-left">Action</th>
            </tr>

        </thead>


        <tbody>

            <tr *ngFor="let job of jobs; let i=index" class="border-t hover:bg-gray-50 transition">

                <td class="p-4 font-medium">
                    {{job.jobTitle}}
                </td>

                <td class="p-4">
                    {{job.company?.companyName}}
                </td>

                <td class="p-4">
                    ₹ {{job.salary}}
                </td>

                <td class="p-4">
                    {{job.applicationDeadline}}
                </td>

                <td class="p-4">

                    <span class="px-3 py-1 text-xs rounded-full bg-teal-100 text-teal-700">

                        {{job.applicants?.length || 0}} Applicants

                    </span>

                </td>

                <td class="p-4 flex gap-3">

                    <button (click)="editJob(i)" class="text-teal-600 hover:text-teal-800">
                        Edit
                    </button>

                    <button (click)="deleteJob(i)" class="text-red-500 hover:text-red-700">
                        Delete
                    </button>

                </td>

            </tr>

        </tbody>

    </table>

</div>



<!-- Modal -->

<div *ngIf="isModalOpen" class="fixed inset-0 bg-black/20 backdrop-blur-sm flex items-center justify-center">

    <div (click)="$event.stopPropagation()" class="bg-white w-[500px] rounded-xl shadow-lg p-6">

        <h2 class="text-xl font-semibold mb-5">

            {{editIndex !== null ? 'Edit Job' : 'Add Job'}}

        </h2>


        <form (ngSubmit)="saveJob()" class="space-y-4">


            <div>

                <label class="block text-sm mb-1">
                    Job Title
                </label>

                <input type="text" [(ngModel)]="job.jobTitle" name="jobTitle" class="w-full border rounded-lg px-3 py-2"
                    required>

            </div>

            <div>

                <label class="block text-sm mb-1">
                    Job Description
                </label>

                <textarea [(ngModel)]="job.jobDescription" name="jobDescription" rows="3"
                    class="w-full border rounded-lg px-3 py-2">
</textarea>

            </div>



            <div>

                <label class="block text-sm mb-1">
                    Eligibility
                </label>

                <input type="text" [(ngModel)]="job.eligibility" name="eligibility"
                    class="w-full border rounded-lg px-3 py-2">

            </div>



            <div>

                <label class="block text-sm mb-1">
                    Salary
                </label>

                <input type="number" [(ngModel)]="job.salary" name="salary" class="w-full border rounded-lg px-3 py-2">

            </div>



            <div>

                <label class="block text-sm mb-1">
                    Application Deadline
                </label>

                <input type="date" [(ngModel)]="job.applicationDeadline" name="applicationDeadline"
                    class="w-full border rounded-lg px-3 py-2">

            </div>

            <div>

                <label class="block text-sm mb-1">
                    Company Name
                </label>

                <input type="text" [(ngModel)]="job.company.companyName" name="companyName"
                    class="w-full border rounded-lg px-3 py-2">

            </div>



            <div class="flex justify-end gap-3 pt-3">

                <button type="button" (click)="closeModal()" class="px-4 py-2 bg-gray-300 rounded-lg hover:bg-gray-400">
                    Cancel
                </button>

                <button type="submit" class="px-4 py-2 bg-teal-500 text-white rounded-lg hover:bg-teal-600">
                    Save Job
                </button>

            </div>


        </form>

    </div>

</div>
