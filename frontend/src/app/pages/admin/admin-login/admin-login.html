<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-[#0f172a] via-[#1e293b] to-[#0f172a] px-4">
  
  <div class="bg-white border border-slate-700/10 shadow-2xl rounded-2xl p-10 w-full max-w-md">
    
    <div class="flex flex-col items-center mb-10">
      <div class="bg-[#10b981] p-3 rounded-xl mb-4 shadow-lg shadow-green-500/20">
         <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path d="M12 14l9-5-9-5-9 5 9 5z" />
          <path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" />
        </svg>
      </div>
      <h2 class="text-2xl font-bold text-[#0f172a]">PortalHub Admin</h2>
      <p class="text-gray-500 text-sm mt-1 font-medium">Please enter your credentials</p>
    </div>

    <form (ngSubmit)="loginAdmin()" class="space-y-6">
      
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2 ml-1">Email Address</label>
        <input
          type="email"
          [(ngModel)]="form.email"
          name="email"
          class="w-full bg-slate-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#10b981]/20 focus:border-[#10b981] transition-all"
          placeholder="admin@portalhub.com"
          required
        >
      </div>

      <div>
        <div class="flex justify-between mb-2 ml-1">
          <label class="block text-sm font-semibold text-gray-700">Password</label>
          <a href="#" class="text-xs text-[#10b981] hover:underline font-medium">Forgot?</a>
        </div>
        <input
          type="password"
          [(ngModel)]="form.password"
          name="password"
          class="w-full bg-slate-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#10b981]/20 focus:border-[#10b981] transition-all"
          placeholder="••••••••"
          required
        >
      </div>

      <button
        type="submit"
        class="w-full bg-[#0f172a] text-white py-3.5 text-sm font-bold rounded-xl hover:bg-slate-900 transform active:scale-[0.98] transition-all duration-200 shadow-lg shadow-slate-200"
      >
        Sign In
      </button>

    </form>

    <div class="mt-10 text-center">
      <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">
        Secure Admin Environment
      </p>
    </div>
  </div>
</div>
