<app-navbar></app-navbar>

<div class="min-h-screen bg-gray-100 flex items-center justify-center pt-24">

  <div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-md">

    <h2 class="text-2xl font-bold text-center text-green-600 mb-6">
      Student Signup
    </h2>

    <form #formRef="ngForm" (ngSubmit)="signup()">

      <!-- Name -->
      <div class="mb-4">
        <label class="block text-gray-600 mb-1">Full Name</label>
        <input
          type="text"
          name="name"
          [(ngModel)]="form.name"
          #name="ngModel"
          minlength="5"
          class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-green-400"
          required
        >
        <p style="color:red" *ngIf="formRef.submitted && name.invalid">
          Name must be at least 5 characters
        </p>
      </div>

      <!-- Phone -->
      <div class="mb-4">
        <label class="block text-gray-600 mb-1">Phone Number</label>
        <input
          type="tel"
          name="phone"
          [(ngModel)]="form.phone"
          #phone="ngModel"
          pattern="^[0-9]{10}$"
          class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-green-400"
          required
        >
        <p style="color:red" *ngIf="formRef.submitted && phone.invalid">
          Phone must be exactly 10 digits
        </p>
      </div>

      <!-- Email -->
      <div class="mb-4">
        <label class="block text-gray-600 mb-1">Email</label>
        <input
          type="email"
          name="email"
          [(ngModel)]="form.email"
          #email="ngModel"
          pattern="^[^@]+@[^@]+\.[a-zA-Z]{2,}$"
          class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-green-400"
          required
        >
        <p style="color:red" *ngIf="formRef.submitted && email.invalid">
          Enter a valid email
        </p>
      </div>

      <!-- Address -->
      <div class="mb-4">
        <label class="block text-gray-600 mb-1">Address</label>
        <textarea
          name="address"
          [(ngModel)]="form.address"
          #address="ngModel"
          pattern=".*[a-zA-Z].*"
          class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-green-400"
          required
        ></textarea>
        <p style="color:red" *ngIf="formRef.submitted && address.invalid">
          Address must contain letters
        </p>
      </div>

      <!-- Password -->
      <div class="mb-4">
        <label class="block text-gray-600 mb-1">Password</label>
        <input
          type="password"
          name="password"
          [(ngModel)]="form.password"
          #password="ngModel"
          pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.*[@$!%*?&]).{4,}$"
          class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-green-400"
          required
        >
        <p style="color:red" *ngIf="formRef.submitted && password.invalid">
          Password must contain uppercase, lowercase, number & special character
        </p>
      </div>

      <!-- Confirm Password -->
      <div class="mb-6">
        <label class="block text-gray-600 mb-1">Confirm Password</label>
        <input
          type="password"
          name="confirmPassword"
          [(ngModel)]="form.confirmPassword"
          #confirmPassword="ngModel"
          class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-green-400"
          required
        >

        <p style="color:red" *ngIf="formRef.submitted && confirmPassword.invalid">
          Confirm password is required
        </p>

        <p style="color:red" *ngIf="formRef.submitted && form.confirmPassword && form.confirmPassword !== form.password">
          Passwords do not match
        </p>
      </div>

      <!-- Button -->
      <button
        type="submit"
        class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700"
      >
        Signup
      </button>

      <p class="text-center text-sm mt-4">
        Already have an account?
        <a routerLink="/login" class="text-blue-600 font-medium">
          Login
        </a>
      </p>

    </form>

  </div>

</div>
