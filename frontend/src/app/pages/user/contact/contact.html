      <div class="bg-white shadow-lg p-6 rounded-lg text-center">

        <h2 class="text-xl font-semibold mb-4">
          Get in Touch
        </h2>

        <p class="mb-2">Phone: +91 98765 43210</p>
        <p class="mb-2">Email: support@placementportal.com</p>
