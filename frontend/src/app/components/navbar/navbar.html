<nav class="bg-black text-white fixed top-0 left-0 w-full shadow-md z-50">

  <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">

    <!-- Logo -->
    <div class="flex items-center space-x-4">
      <div class="bg-white text-black font-bold px-4 py-2 rounded text-lg">
        PMS
      </div>
      <span class="font-semibold text-xl">
        Placement Portal
      </span>
    </div>

    <!-- Navigation -->
    <div class="flex items-center space-x-8 text-base">

      <ng-container *ngIf="isLoggedIn">
        <a routerLink="/student-dashboard" class="flex items-center gap-2 hover:text-gray-300 transition">
          <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z" />
          </svg>
          Dashboard
        </a>
      </ng-container>

      <a routerLink="/" class="hover:text-gray-300 transition">
        Home
      </a>

      <a routerLink="/about" class="hover:text-gray-300 transition">
        About Us
      </a>

      <a routerLink="/contact" class="hover:text-gray-300 transition">
        Contact Us
      </a>

      <!-- Show when NOT logged in -->
      <ng-container *ngIf="!isLoggedIn">
        <a routerLink="/signup" class="hover:text-gray-300 transition">
          Signup
        </a>

        <a routerLink="/login" class="text-white rounded-lg transition">
          <i class="fa fa-sign-in" aria-hidden="true"></i>
          &nbsp;Login
        </a>
      </ng-container>

      <!-- Show when logged in -->

      <ng-container *ngIf="isLoggedIn">
       

        <div class="flex items-center">
          <button (click)="logout()" class="text-white px-2 py-2 rounded-lg transition">
            <i class="fa fa-sign-out" aria-hidden="true"></i>
            &nbsp;Logout
          </button>
        </div>

         <button type="button" (click)="openNotices()" class="relative text-white hover:text-gray-300 transition">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V4a2 2 0 10-4 0v1.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
          </svg>
          <span *ngIf="unreadNoticeCount > 0"
            class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] min-w-[18px] h-[18px] px-1 rounded-full flex items-center justify-center">
            {{ unreadNoticeCount }}
          </span>
        </button>
      </ng-container>

    </div>

  </div>

</nav>
